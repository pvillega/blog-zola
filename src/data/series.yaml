# Series metadata file.
# Each entry defines a series that groups related blog posts.
#
# Fields:
#   id: string - unique identifier, must match the `series` frontmatter value in posts
#   title: string - display name for the series
#   description: string - short description shown on series cards and detail pages
#   coverImage: string - path to cover image relative to src/assets/series/
#   status: "ongoing" | "complete" - whether the series is still being written
#   sections: (optional) array of section objects for hierarchical organization
#     - id: string - unique within this series, must match posts' `seriesSection` value
#       title: string - display name for the section
#       description: string - explanatory text shown when section is expanded
#       order: number - position of this section within the series
#
# Posts reference their section via the `seriesSection` frontmatter field.
# Series without sections display chapters in a flat list (backwards compatible).
#
# Example:
#   - id: "durable-computing"
#     title: "Durable Computing Deep Dive"
#     description: "A comprehensive exploration of durable computing patterns..."
#     coverImage: "./durable-computing.png"
#     status: "ongoing"
#     sections:
#       - id: "foundations"
#         title: "Part I: Foundations"
#         description: "Core concepts and motivation behind durable computing."
#         order: 1
#       - id: "patterns"
#         title: "Part II: Patterns"
#         description: "Practical patterns for building durable systems."
#         order: 2

- id: "durable-computing"
  title: "Durable Computing Deep Dive"
  description: "A comprehensive exploration of durable computing patterns and how they change the way we build reliable systems."
  coverImage: "./durable-computing.png"
  status: "ongoing"
  sections:
    - id: "foundations"
      title: "Part I: Foundations"
      description: "Core concepts, motivation, and the fundamental building blocks of durable computing. Start here if you're new to the topic."
      order: 1
    - id: "patterns"
      title: "Part II: Patterns"
      description: "Practical patterns and implementation strategies for building durable systems in production."
      order: 2
